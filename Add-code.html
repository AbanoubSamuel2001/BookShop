<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"

    <link rel="stylesheet" href="./css/main.css" />

  <body>
    <section class="hero">
      <nav class="navbar navbar-expand-lg px-4 py-3">
        <!-- Logo -->
        <a
          href="#"
          class="navbar-brand text-white fw-bold d-flex align-items-center gap-2"
        >
          <i class="fa-solid fa-book-open"></i>
          <span>BookShop</span>
        </a>

        <!-- Mobile Button -->
        <button
          class="navbar-toggler text-white border-0 shadow-none"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <i class="fa-solid fa-bars"></i>
        </button>

        <!-- Menu -->
        <div
          class="collapse navbar-collapse justify-content-between"
          id="mainNav"
        >
          <!-- Links -->
          <ul class="navbar-nav mx-auto text-center gap-lg-3">
            <li class="nav-item">
              <a class="nav-link text-white active" href="./home.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-white" href="./Books.html">Books</a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-white" href="./about.html">About Us</a>
            </li>
          </ul>

          <!-- Buttons -->
          <div class="d-flex flex-column flex-lg-row gap-2 mt-3 mt-lg-0">
            <button class="btn login-btn">Log in</button>
            <button class="btn signup-btn">Sign Up</button>
          </div>
        </div>
      </nav>
    </section>

    <section class="reset-box">
      <h4 class="title mb-3">Reset your password!</h4>
      <p class="text-muted">
        Enter the 4 digits code that you received on your emai
      </p>

      <div class="otp-inputs">
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
      </div>

      <button class="btn btn-pink mb-4">Reset password</button>

      <p class="resend">
        Didn’t receive a code?
        <a href="#">Send again</a>
      </p>
    </section>

    <footer class="py-5 mt-5">
      <div class="container">
        <!-- Top Row -->
        <div class="row align-items-center mb-4">
          <!-- Left -->
          <div
            class="col-md-6 d-flex align-items-center gap-4 flex-wrap text-white"
          >
            <h5 class="mb-0">
              <i class="fa-solid fa-book-open"></i>
              Bookshop
            </h5>

            <a href="./home.html">Home</a>
            <a href="./Books.html">Books</a>
            <a href="./about.html">About Us</a>
          </div>

          <!-- Right -->
          <div class="col-md-6 text-md-end mt-3 mt-md-0 social-icons">
            <a href="#"><i class="bi bi-facebook"></i></a>
            <a href="#"><i class="bi bi-instagram"></i></a>
            <a href="#"><i class="bi bi-youtube"></i></a>
            <a href="#"><i class="bi bi-twitter-x"></i></a>
          </div>
        </div>

        <hr class="border-light opacity-25" />

        <!-- Bottom Row -->
        <div class="row align-items-center">
          <!-- Left -->
          <div class="col-md-6 text-white small">
            Developed By> EraaSoft &copy; All Copy Rights Reserved @2024
          </div>

          <!-- Right -->
          <div class="col-md-6 text-md-end mt-3 mt-md-0">
            <span class="text-white me-3 fs-5">
              <i class="bi bi-globe"></i>
            </span>

            <button class="lang-btn">
              English <i class="fa-solid fa-earth-americas"></i>
            </button>
